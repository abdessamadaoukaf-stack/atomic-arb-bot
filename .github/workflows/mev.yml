name: Apex Sniper 24/7

on:
  workflow_dispatch: # Allows you to trigger it manually
  schedule:
    - cron: '0 */5 * * *' # Automatically restarts every 5 hours to bypass GitHub's 6-hour limit

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Apex Sniper
        env:
          ALCHEMY_HTTP_URL: ${{ secrets.ALCHEMY_HTTP_URL }}
          ALCHEMY_WS_URL: ${{ secrets.ALCHEMY_WS_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: cargo run --release