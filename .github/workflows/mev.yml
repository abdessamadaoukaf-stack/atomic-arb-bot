name: Apex Sniper 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  hunt:
    runs-on: ubuntu-latest
    env:
      # This fixes the Node.js deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Apex Sniper
        working-directory: ./apex-sniper
        env:
          # Map the GitHub Secrets to the Bot's Environment
          ALCHEMY_HTTP_URL: ${{ secrets.ALCHEMY_HTTP_URL }}
          ALCHEMY_WS_URL: ${{ secrets.ALCHEMY_WS_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: cargo run --release